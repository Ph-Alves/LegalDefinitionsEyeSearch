<!DOCTYPE html>
<html lang="pt-BR" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EyeSearch — Legal Documents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #5e9bff;
      --accent-light: #a8c8ff;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 20px 0;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .lang-switcher {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .lang-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }

    .lang-btn:hover { color: var(--text); background: var(--border); }

    .lang-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(94, 155, 255, 0.1);
    }

    nav {
      display: flex;
      gap: 4px;
      justify-content: center;
      overflow-x: auto;
      scrollbar-width: none;
    }

    nav::-webkit-scrollbar { display: none; }

    .tab {
      padding: 12px 20px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border: 1px solid transparent;
      border-bottom: none;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      white-space: nowrap;
      background: transparent;
      user-select: none;
    }

    .tab:hover { color: var(--text); background: var(--border); }

    .tab.active {
      color: var(--accent);
      background: var(--bg);
      border-color: var(--border);
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-light);
      margin: 36px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin: 20px 0 8px;
    }

    p { color: var(--text-muted); margin-bottom: 12px; }
    p:last-child { margin-bottom: 0; }

    ul, ol {
      color: var(--text-muted);
      padding-left: 20px;
      margin-bottom: 12px;
    }

    li { margin-bottom: 6px; }

    strong { color: var(--text); font-weight: 600; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .info-box {
      background: rgba(94, 155, 255, 0.07);
      border: 1px solid rgba(94, 155, 255, 0.2);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin: 24px 0;
    }

    .info-box p { color: var(--text-muted); margin: 0; }

    .badge {
      display: inline-block;
      background: rgba(94, 155, 255, 0.15);
      color: var(--accent);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      margin-right: 6px;
    }

    footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">ES</div>

  <div class="lang-switcher">

    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
  </div>
  <nav id="tab-nav"></nav>
</header>

<main id="main-content"></main>
<footer id="footer-content"></footer>

        { type: 'h2', text: '1. Who we are' },

        { type: 'p', html: 'For questions or requests, contact: <a href="mailto:eyesearchapp@gmail.com">eyesearchapp@gmail.com</a>' },
        { type: 'h2', text: '2. Data we collect' },
        { type: 'p', html: 'EyeSearch was designed with the principle of <strong>data minimization</strong>. We do not create user accounts and do not collect personally identifiable data beyond what is strictly necessary for the application to function.' },
        { type: 'h3', text: '2.1 Camera and image data' },
        { type: 'p', html: 'The camera is accessed <strong>exclusively in real time</strong> during object searches. No images or videos are saved, sent to servers, or shared with third parties. All processing occurs entirely on the device (<em>on-device</em>).' },
        { type: 'h3', text: '2.2 Location data' },
        { type: 'p', html: 'Approximate location may be used to send personalized notifications when you move, reminding you to check your belongings. This feature is optional, uses only background access when authorized, and location data is <strong>never transmitted</strong> to external servers.' },
        { type: 'h3', text: '2.3 Local preferences and settings' },
        { type: 'p', html: 'Your preferences (theme, contrast, sound, haptics, language) are stored locally on the device via Apple\'s <strong>UserDefaults</strong>. This data does not leave your iPhone.' },
        { type: 'h3', text: '2.4 Chatbot usage data (Foundation Models)' },
        { type: 'p', html: 'The chatbot integrated into the app uses <strong>Apple Foundation Models</strong>, which processes interactions <strong>entirely on the device</strong>, without connecting to external servers. No conversations are recorded or transmitted.' },
        { type: 'h2', text: '3. How we use your information' },
        { type: 'ul', items: [
          'Enable camera and sticker detection functionality;',
          'Send location notifications when authorized by the user;',
          'Save your accessibility and personalization preferences;',
          'Generate sticker PDFs for printing, exclusively on the device;',
          'Answer questions via chatbot in a local and private manner.'
        ]},
        { type: 'h2', text: '4. Data sharing' },
        { type: 'p', html: 'EyeSearch <strong>does not sell, rent, share, or transfer</strong> any personal data to third parties. All technologies used belong to the Apple ecosystem (<em>AVFoundation, CoreLocation, Foundation Models, ARKit</em>) and operate under Apple\'s Privacy Policy.' },
        { type: 'h2', text: '5. Device permissions' },
        { type: 'p', html: 'The application may request the following permissions, which you can revoke at any time in <strong>Settings &gt; EyeSearch</strong>:' },
        { type: 'ul', items: [
          '<span class="badge">Camera</span> Required for sticker detection;',
          '<span class="badge">Location</span> Optional, for movement notifications;',
          '<span class="badge">Notifications</span> Optional, for personalized alerts;',
          '<span class="badge">Flashlight</span> Automatically activated during searches for better visibility.'
        ]},
        { type: 'h2', text: '6. Data retention and deletion' },
        { type: 'p', html: 'Since all data is stored locally, you can delete it at any time by uninstalling the application. This permanently removes all settings and data associated with EyeSearch from your device.' },
        { type: 'h2', text: '7. Security' },
        { type: 'p', html: 'We adopt the security practices recommended by Apple for iOS development. Since sensitive data (camera, location) is processed exclusively on the device, the risk of exposure through server breaches is nonexistent.' },
        { type: 'h2', text: '8. Children' },
        { type: 'p', html: 'EyeSearch is intended for users aged <strong>16 and over</strong>. We do not intentionally collect data from users under 16. If you suspect a minor has used the application, please contact us.' },
        { type: 'h2', text: '9. Your rights (LGPD)' },
        { type: 'p', html: 'Under the LGPD, you have the right to:' },
        { type: 'ul', items: [
          'Confirm the existence of personal data processing;',
          'Access, correct, or delete your data;',
          'Withdraw consent at any time;',
          'Obtain information about data sharing.'
        ]},
        { type: 'p', html: 'To exercise these rights, contact: <a href="mailto:eyesearchapp@gmail.com">eyesearchapp@gmail.com</a>' },
        { type: 'h2', text: '10. Changes to this policy' },
        { type: 'p', html: 'This policy may be updated periodically. In the event of significant changes, you will be notified by the application. The most recent version will always be available on this page.' }
      ]
    },

        { type: 'p', html: 'Stickers generated by the application are for the user\'s personal and free use.' },
        { type: 'h2', text: '7. Limitation of liability' },
        { type: 'p', html: 'EyeSearch is provided <strong>"as is"</strong>, without express or implied warranties. In no event shall the development team be liable for:' },

        { type: 'h2', text: '8. Updates and modifications' },
        { type: 'p', html: 'We reserve the right to update the application and modify these terms at any time. Significant changes will be communicated through an in-app notification or by updating this page. Continued use of the application after changes constitutes acceptance of the new terms.' },
        { type: 'h2', text: '9. Termination' },
        { type: 'p', html: 'We may suspend or terminate your access to the application in case of violation of these terms. You may terminate your use at any time by uninstalling the application from your device.' },

        { type: 'p', html: 'For questions related to these Terms of Use: <a href="mailto:eyesearchapp@gmail.com">eyesearchapp@gmail.com</a>' }
      ]
    },
    cookies: {
      title: 'Cookie Policy',
      meta: 'Last updated: April 20, 2026 · Version 1.0',
      blocks: [
        { type: 'infobox', html: 'This policy explains the use of local storage technologies in the <strong>EyeSearch</strong> application. Unlike websites, iOS applications do not use browser cookies — but employ equivalent local persistence mechanisms.' },
        { type: 'h2', text: '1. Does EyeSearch use cookies?' },
        { type: 'p', html: 'No. EyeSearch is a native <strong>iOS</strong> application and therefore <strong>does not use browser cookies</strong> in the traditional sense. Cookies are a storage technology specific to web environments, and EyeSearch does not have a web interface or WebView that makes use of cookies.' },
        { type: 'p', html: 'However, to ensure full transparency, this policy describes the <strong>equivalent local storage technologies</strong> used by the application.' },
        { type: 'h2', text: '2. Local storage used' },
        { type: 'h3', text: '2.1 UserDefaults' },
        { type: 'p', html: 'EyeSearch uses <strong>UserDefaults</strong>, a native iOS mechanism equivalent to preference cookies, to locally save:' },
        { type: 'ul', items: [
          'Theme preferences (light/dark/contrast);',
          'Accessibility settings (haptics, sound);',
          'Selected language;',
          'Onboarding status (whether the user has completed the introduction);',
          'Objects registered by the user.'
        ]},
        { type: 'p', html: 'This data is stored <strong>exclusively on the device</strong>, is not sent to external servers, and is accessible only to EyeSearch.' },
        { type: 'h3', text: '2.2 Local file storage' },
        { type: 'p', html: 'Sticker PDFs generated by the user may be temporarily saved in the <strong>application\'s documents directory</strong> to allow viewing and printing. These files remain on the device until the user deletes them or uninstalls the application.' },
        { type: 'h3', text: '2.3 Machine learning models' },
        { type: 'p', html: 'The ML and Foundation Models used by the application are stored on the device after the initial download and are used for local processing. No inference data is transmitted externally.' },
        { type: 'h2', text: '3. Analytics and tracking' },
        { type: 'p', html: 'EyeSearch <strong>does not use</strong> behavioral analytics tools, usage tracking, advertising SDKs, or any user profiling technology. There is no integration with Google Analytics, Firebase Analytics, Mixpanel, or similar services.' },
        { type: 'h2', text: '4. Third-party technologies' },
        { type: 'p', html: 'The application operates entirely within the Apple ecosystem and uses only native iOS frameworks. There are no third-party SDKs that perform data storage on the device.' },
        { type: 'h2', text: '5. Control and deletion' },
        { type: 'p', html: 'Since all data is stored locally on your device, you retain full control:' },
        { type: 'ul', items: [
          '<strong>Reset settings</strong>: available in the application\'s Settings;',
          '<strong>Delete all data</strong>: uninstalling EyeSearch permanently removes all local data;',
          '<strong>Revoke permissions</strong>: in <em>iPhone Settings &gt; EyeSearch</em>, you can revoke access to camera, location, and notifications.'
        ]},
        { type: 'h2', text: '6. Web page and GitHub Pages' },
        { type: 'p', html: 'This legal documents page is hosted on <strong>GitHub Pages</strong>. GitHub may collect technical browsing data (such as IP address) for operational purposes, in accordance with <a href="https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement" target="_blank" rel="noopener">GitHub\'s Privacy Policy</a>. This page does not use its own analytical cookies.' },
        { type: 'h2', text: '7. Contact' },
        { type: 'p', html: 'For questions about this policy: <a href="mailto:eyesearchapp@gmail.com">eyesearchapp@gmail.com</a>' }
      ]
    }
  },

        { type: 'h2', text: '2. हम क्या डेटा एकत्र करते हैं' },

        { type: 'h3', text: '2.1 कैमरा और छवि डेटा' },

        { type: 'h2', text: '9. आपके अधिकार (LGPD)' },

const PAGES = ['privacy', 'terms', 'cookies'];
let lang = localStorage.getItem('eyesearch-lang') || 'pt';
let page = PAGES.includes(location.hash.replace('#', '')) ? location.hash.replace('#', '') : 'privacy';

function setLang(l) {
  lang = l;
  localStorage.setItem('eyesearch-lang', l);
  document.getElementById('html-root').lang = T[l].htmlLang;
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['pt', 'en', 'hi', 'zh'][i] === l);
  });
  render();
}

function showPage(p) {
  page = p;
  history.replaceState(null, '', '#' + p);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderBlocks(blocks) {
  return blocks.map(b => {
    switch (b.type) {
      case 'infobox': return '<div class="info-box"><p>' + b.html + '</p></div>';
      case 'h2':      return '<h2>' + b.text + '</h2>';
      case 'h3':      return '<h3>' + b.text + '</h3>';
      case 'p':       return '<p>' + b.html + '</p>';
      case 'ul':      return '<ul>' + b.items.map(i => '<li>' + i + '</li>').join('') + '</ul>';
      default:        return '';
    }
  }).join('');
}

function render() {
  const t = T[lang];
  document.getElementById('html-root').lang = t.htmlLang;

  document.getElementById('tab-nav').innerHTML = PAGES.map((p, i) =>
    '<div class="tab' + (p === page ? ' active' : '') + '" onclick="showPage(\'' + p + '\')">' + t.tabs[i] + '</div>'
  ).join('');

  const doc = t[page];
  document.getElementById('main-content').innerHTML =
    '<section><h1>' + doc.title + '</h1><div class="meta">' + doc.meta + '</div>' +
    renderBlocks(doc.blocks) + '</section>';

  document.getElementById('footer-content').innerHTML =
    '<p>' + t.footer.rights + '</p>' +
    '<p style="margin-top:6px">' + t.footer.team + '</p>';
}

// Initialize language button states
document.querySelectorAll('.lang-btn').forEach((btn, i) => {
  btn.classList.toggle('active', ['pt', 'en', 'hi', 'zh'][i] === lang);
});

render();

window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#', '');
  if (PAGES.includes(hash)) { page = hash; render(); }
});
